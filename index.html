<section class="speed-check" id="check" style="background:#0f172a;color:white;padding:60px 0;">

<div style="max-width:900px;margin:auto;text-align:center;">

<h2 style="font-size:32px;margin-bottom:10px;">
Controleer de snelheid van uw website
</h2>

<p style="color:#94a3b8;">
Komt u via onze e-mail? Dan staat uw website hieronder mogelijk al ingevuld.
</p>

<div style="display:flex;gap:10px;margin-top:25px;justify-content:center;">
<input id="url" placeholder="https://uwwebsite.nl"
style="flex:1;max-width:600px;padding:16px;border-radius:10px;border:2px solid #10b981;background:#020617;color:white;font-size:16px;">

<button onclick="check()"
style="padding:16px 25px;border:none;border-radius:10px;background:#10b981;color:#062019;font-weight:900;">
Analyseren
</button>
</div>

<div id="result" style="margin-top:30px;"></div>

</div>
</section>

<script>
function fixUrl(url){
  if(!url.startsWith("http")){
    return "https://" + url;
  }
  return url;
}

async function check(){

  const input = document.getElementById("url");
  const result = document.getElementById("result");

  let url = fixUrl(input.value);

  result.innerHTML = "Bezig met analyse...";

  try{

    const api = "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=" + encodeURIComponent(url);

    const res = await fetch(api);
    const data = await res.json();

    if(!data.lighthouseResult){
      throw new Error("geen data");
    }

    const score = Math.round(data.lighthouseResult.categories.performance.score * 100);

    let kleur = "#10b981";
    if(score < 50) kleur = "#ef4444";
    else if(score < 80) kleur = "#f59e0b";

    result.innerHTML = `
      <div style="background:#1e293b;padding:30px;border-radius:15px;">
        <div style="font-size:55px;font-weight:900;color:${kleur};">${score}</div>
        <p>${score < 50 ? "Uw website is traag" : score < 80 ? "Kan beter" : "Goed"}</p>

        <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;">
          <a href="https://websitesnellermaken.sitesnel24.nl/?site=${encodeURIComponent(url)}"
          style="background:#10b981;color:#062019;padding:14px;border-radius:10px;text-decoration:none;font-weight:900;">
          Website sneller maken
          </a>

          <a href="https://websitelatenmaken.sitesnel24.nl/?site=${encodeURIComponent(url)}"
          style="border:2px solid #10b981;color:#10b981;padding:14px;border-radius:10px;text-decoration:none;font-weight:900;">
          Nieuwe website laten maken
          </a>
        </div>
      </div>
    `;

  }catch(e){

    result.innerHTML = `
      <div style="background:#1e293b;padding:30px;border-radius:15px;">
        <h3>Analyse niet beschikbaar</h3>
        <p>De test werkt nu niet. Kies hieronder wat u wilt doen.</p>

        <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;">
          <a href="https://websitesnellermaken.sitesnel24.nl/?site=${encodeURIComponent(url)}"
          style="background:#10b981;color:#062019;padding:14px;border-radius:10px;text-decoration:none;font-weight:900;">
          Website laten nakijken
          </a>

          <a href="https://websitelatenmaken.sitesnel24.nl/?site=${encodeURIComponent(url)}"
          style="border:2px solid #10b981;color:#10b981;padding:14px;border-radius:10px;text-decoration:none;font-weight:900;">
          Nieuwe website laten maken
          </a>
        </div>
      </div>
    `;
  }
}

// AUTO INVULLEN
const params = new URLSearchParams(window.location.search);
const site = params.get("site");

if(site){
  document.getElementById("url").value = site;
}
</script>
