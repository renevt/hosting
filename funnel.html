<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website snelheid controleren | SiteSnel24</title>
<meta name="description" content="Controleer de snelheid van uw website met Google PageSpeed Insights.">
<meta name="theme-color" content="#10b981">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#10b981;
  --dark:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --soft:#94a3b8;
  --border:#334155;
  --red:#ef4444;
  --orange:#f59e0b;
}

body{
  font-family:Arial;
  background:var(--dark);
  color:var(--soft);
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.logo{
  text-align:center;
  color:var(--green);
  font-size:26px;
  font-weight:900;
  margin:20px 0;
}

.box{
  background:var(--card);
  padding:30px;
  border-radius:16px;
  border:1px solid var(--border);
  margin-bottom:20px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:2px solid var(--green);
  margin-bottom:15px;
  background:#020617;
  color:white;
}

button{
  width:100%;
  padding:15px;
  background:var(--green);
  border:none;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}

.result{display:none}

.score{
  font-size:60px;
  font-weight:900;
}

.red{color:var(--red)}
.orange{color:var(--orange)}
.green{color:var(--green)}

.btn{
  display:block;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-decoration:none;
  font-weight:900;
}

.whatsapp{
  background:#25d366;
  color:white;
}

.choice{
  margin-top:20px;
  display:grid;
  gap:10px;
}

.choice a{
  padding:15px;
  border-radius:10px;
  background:#111827;
  text-decoration:none;
  color:white;
}

.email-text{
  margin-top:15px;
  font-size:14px;
}

.email-text a{
  color:var(--green);
  font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">SiteSnel24</div>

<div class="box">
<h2>Controleer uw website</h2>

<input id="site" placeholder="uwwebsite.nl">
<button onclick="startTest()">Analyseer</button>
</div>

<div class="box result" id="result">

<div id="siteText"></div>

<div id="scoreBox"></div>

<p id="advies"></p>

<a id="wa" class="btn whatsapp" target="_blank">
Bespreek via WhatsApp
</a>

<div class="email-text">
Liever per e-mail? 
<a href="mailto:info@sitesnel24.nl?subject=Website check SiteSnel24">
info@sitesnel24.nl
</a>
</div>

<div class="choice">
<a id="speed">Website sneller maken</a>
<a id="new">Nieuwe website laten maken</a>
</div>

</div>

</div>

<script>
function norm(url){
  if(!url.startsWith("http")) url="https://"+url;
  return url;
}

function startTest(){
  let site = document.getElementById("site").value.trim();
  if(!site) return alert("Voer website in");

  site = norm(site);

  localStorage.setItem("site",site);
  localStorage.setItem("tested","yes");

  window.open("https://pagespeed.web.dev/analysis?url="+encodeURIComponent(site));
}

function show(){
  let site = localStorage.getItem("site");
  let tested = localStorage.getItem("tested");

  if(!site || tested!=="yes") return;

  let score = localStorage.getItem("score");

  document.getElementById("result").style.display="block";
  document.getElementById("siteText").innerHTML="Website: <b>"+site+"</b>";

  let scoreBox = document.getElementById("scoreBox");

  if(score){
    let s = parseInt(score);

    let color = s<50?"red":s<80?"orange":"green";

    scoreBox.innerHTML="<div class='score "+color+"'>"+s+"</div>";

    document.getElementById("advies").innerText =
      s<50 ? "Uw website is traag, klanten haken af."
      : s<80 ? "Uw website kan sneller."
      : "Uw website is goed.";
  }else{
    document.getElementById("advies").innerText =
      "Heeft u de score gezien? Stuur hem via WhatsApp.";
  }

  let msg="Hoi, mijn website is "+site;
  if(score) msg+=" en mijn score is "+score;

  document.getElementById("wa").href =
    "https://wa.me/31646950301?text="+encodeURIComponent(msg);

  document.getElementById("speed").href =
    "https://websitesnellermaken.sitesnel24.nl/?site="+encodeURIComponent(site);

  document.getElementById("new").href =
    "https://websitelatenmaken.sitesnel24.nl/?site="+encodeURIComponent(site);
}

window.onload = function(){
  let params = new URLSearchParams(window.location.search);

  if(params.get("site")){
    let s = norm(params.get("site"));
    document.getElementById("site").value=s;
    localStorage.setItem("site",s);
  }

  if(params.get("score")){
    localStorage.setItem("score",params.get("score"));
    localStorage.setItem("tested","yes");
  }

  show();
};

window.onfocus = show;
</script>

</body>
</html>
