<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gratis demo website aanvragen | SiteSnel24</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#0f1115;
  color:#fff;
  padding:20px;
}

.container {
  max-width:560px;
  margin:40px auto;
  background:#181b22;
  padding:28px;
  border-radius:18px;
}

.logo {
  font-size:26px;
  font-weight:bold;
  color:#25D366;
  margin-bottom:16px;
}

h1 {
  font-size:28px;
  margin-bottom:12px;
}

p {
  color:#d7d7d7;
  margin-bottom:20px;
  line-height:1.5;
}

input, textarea {
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #303642;
  font-size:15px;
}

textarea {
  min-height:120px;
}

button {
  width:100%;
  padding:16px;
  background:#25D366;
  border:none;
  color:#fff;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
}

button:hover {
  background:#1ebe5d;
}

.checkbox {
  margin-bottom:15px;
  font-size:14px;
}

.note {
  font-size:13px;
  color:#aaa;
  margin-top:-8px;
  margin-bottom:12px;
}

.error {
  color:#ff4d4d;
  font-size:13px;
  margin-top:-10px;
  margin-bottom:10px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">SiteSnel24</div>

<h1>Gratis demo website aanvragen</h1>

<p>
Vul alle gegevens in. Wij nemen contact met je op via WhatsApp of telefoon om je demo af te stemmen.
</p>

<form id="demoForm" action="https://formsubmit.co/info@sitesnel24.nl" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_subject" value="Nieuwe demo aanvraag SiteSnel24">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://sitesnel24.nl/bedankt/">

<input type="text" name="_honey" style="display:none">
<input type="hidden" id="whatsappLink" name="WhatsApp link" value="">

<input type="text" name="Bedrijfsnaam" placeholder="Bedrijfsnaam" required>
<input type="text" name="Naam" placeholder="Naam" required>

<input 
  type="tel" 
  id="telefoon"
  name="Telefoon" 
  placeholder="06 12345678 of +31 6 12345678" 
  required
>

<div id="phoneError" class="error">
Voer een geldig Nederlands telefoonnummer in.
</div>

<div class="note">
Wij gebruiken dit nummer om je snel te kunnen bereiken over je demo.
</div>

<input type="email" name="Email" placeholder="E-mailadres" required>

<textarea name="Beschrijving" placeholder="Wat doet jouw bedrijf en wat bied je aan?" required></textarea>

<label>Upload foto 1</label>
<input type="file" name="foto1" accept="image/*" required>

<label>Upload foto 2</label>
<input type="file" name="foto2" accept="image/*" required>

<label>Upload foto 3</label>
<input type="file" name="foto3" accept="image/*" required>

<div class="checkbox">
<label>
<input type="checkbox" name="Toestemming contact" value="Ja" required>
 Ik ga ermee akkoord dat SiteSnel24 contact met mij opneemt via WhatsApp of telefoon over mijn aanvraag.
</label>
</div>

<button type="submit">Vraag gratis demo aan</button>

</form>

</div>

<script>
document.getElementById("demoForm").addEventListener("submit", function(e) {

  let telefoon = document.getElementById("telefoon").value;

  telefoon = telefoon.replace(/\s+/g, "");
  telefoon = telefoon.replace(/-/g, "");

  const regex = /^(06\d{8}|316\d{8}|\+316\d{8})$/;

  if (!regex.test(telefoon)) {
    e.preventDefault();
    document.getElementById("phoneError").style.display = "block";
    return;
  }

  document.getElementById("phoneError").style.display = "none";

  if (telefoon.startsWith("06")) {
    telefoon = "31" + telefoon.substring(1);
  }

  if (telefoon.startsWith("+31")) {
    telefoon = telefoon.replace("+", "");
  }

  const bericht = encodeURIComponent("Hallo, ik heb uw demo aanvraag ontvangen via SiteSnel24. Ik neem contact met u op als er nog vragen zijn over de demo.");

  const whatsappUrl = "https://wa.me/" + telefoon + "?text=" + bericht;

  document.getElementById("whatsappLink").value = whatsappUrl;
});
</script>

</body>
</html>
