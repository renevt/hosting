<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gratis demo website aanvragen | SiteSnel24</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#0f1115;
  color:#fff;
  padding:20px;
}

.container {
  max-width:560px;
  margin:40px auto;
  background:#181b22;
  padding:28px;
  border-radius:18px;
}

.logo {
  font-size:26px;
  font-weight:bold;
  color:#25D366;
  margin-bottom:16px;
}

h1 { font-size:28px; margin-bottom:12px; }

p {
  color:#d7d7d7;
  margin-bottom:20px;
  line-height:1.5;
}

input, textarea {
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #303642;
  font-size:15px;
}

textarea { min-height:120px; }

label {
  display:block;
  margin-bottom:6px;
  font-size:14px;
}

button {
  width:100%;
  padding:16px;
  background:#25D366;
  border:none;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

button:hover { background:#1ebe5d; }

.checkbox {
  margin-bottom:15px;
  font-size:14px;
}

.note {
  font-size:13px;
  color:#aaa;
  margin-top:-8px;
  margin-bottom:12px;
}

.small {
  font-size:12px;
  color:#aaa;
  margin-top:10px;
  margin-bottom:15px;
  line-height:1.5;
}

.small a {
  color:#25D366;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">SiteSnel24</div>

<h1>Gratis demo website aanvragen</h1>

<p>
Vul alle gegevens in. Wij nemen contact met u op via WhatsApp of telefoon om uw aanvraag te bespreken.
</p>

<form action="https://formsubmit.co/info@sitesnel24.nl" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_next" value="https://sitesnel24.nl/bedankt/index.html">
<input type="hidden" name="_subject" value="Nieuwe demo aanvraag SiteSnel24">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input type="text" name="_honey" style="display:none">

<input type="hidden" name="Toestemming omschrijving" value="Klant geeft toestemming voor contact via WhatsApp of telefoon over de demo aanvraag">

<input type="text" name="Bedrijfsnaam" placeholder="Bedrijfsnaam" required>
<input type="text" name="Naam" placeholder="Naam" required>

<input type="tel" name="Telefoon" placeholder="06 12345678" required>

<div class="note">
Wij gebruiken dit nummer om u snel te kunnen bereiken over uw demo.
</div>

<input type="email" name="Email" placeholder="E-mailadres" required>

<textarea name="Beschrijving" placeholder="Wat doet uw bedrijf en wat biedt u aan?" required></textarea>

<label>Upload foto 1</label>
<input type="file" name="foto1" accept="image/*" required>

<label>Upload foto 2</label>
<input type="file" name="foto2" accept="image/*" required>

<label>Upload foto 3</label>
<input type="file" name="foto3" accept="image/*" required>

<div class="checkbox">
<label>
<input type="checkbox" name="Akkoord WhatsApp/telefoon contact" value="Ja" required>
 Ik ga ermee akkoord dat SiteSnel24 contact met mij opneemt via WhatsApp of telefoon over mijn demo aanvraag.
</label>
</div>

<p class="small">
Door het versturen van dit formulier gaat u akkoord met onze
<a href="/privacy.html">privacyverklaring</a>.
</p>

<button type="submit">Vraag gratis demo aan</button>

</form>

</div>

</body>
</html>
