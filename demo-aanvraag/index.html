<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratis demo website aanvragen | SiteSnel24</title>
<style>
body { font-family: Arial, sans-serif; background:#0f1115; color:#fff; padding:20px; }
.container { max-width:560px; margin:40px auto; background:#181b22; padding:28px; border-radius:18px; }
input, textarea, button { width:100%; padding:14px; margin-bottom:14px; border-radius:10px; border:1px solid #303642; }
button { background:#25D366; color:white; font-weight:bold; cursor:pointer; }
.logo { color:#25D366; font-size:26px; font-weight:bold; margin-bottom:16px; }
</style>
</head>
<body>

<div class="container">
<div class="logo">SiteSnel24</div>
<h1>Gratis demo website aanvragen</h1>

<form action="https://formsubmit.co/info@sitesnel24.nl" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_next" value="https://sitesnel24.nl/bedankt/index.html">
<input type="hidden" name="_subject" value="Nieuwe demo aanvraag SiteSnel24">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input type="text" name="Bedrijfsnaam" placeholder="Bedrijfsnaam" required>
<input type="text" name="Naam" placeholder="Naam" required>
<input type="tel" name="Telefoon" placeholder="06 12345678" required>
<input type="email" name="Email" placeholder="E-mailadres" required>

<textarea name="Beschrijving" placeholder="Wat doet uw bedrijf en wat biedt u aan?" required></textarea>

<input type="file" name="foto1" accept="image/*" required>
<input type="file" name="foto2" accept="image/*" required>
<input type="file" name="foto3" accept="image/*" required>

<label>
<input type="checkbox" name="Toestemming contact" value="Ja" required>
Ik ga ermee akkoord dat SiteSnel24 contact met mij kan opnemen via WhatsApp of telefoon.
</label>

<button type="submit">Vraag gratis demo aan</button>

</form>
</div>

</body>
</html>
