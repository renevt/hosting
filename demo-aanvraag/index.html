<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gratis demo website aanvragen | SiteSnel24</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#0f1115;
  color:#fff;
  padding:20px;
}

.container {
  max-width:560px;
  margin:40px auto;
  background:#181b22;
  padding:28px;
  border-radius:18px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.logo {
  font-size:26px;
  font-weight:bold;
  color:#25D366;
  margin-bottom:16px;
}

h1 {
  font-size:28px;
  margin-bottom:12px;
}

p {
  color:#d7d7d7;
  margin-bottom:20px;
  line-height:1.5;
}

input, textarea {
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #303642;
  font-size:15px;
}

textarea {
  min-height:120px;
}

button {
  width:100%;
  padding:16px;
  background:#25D366;
  border:none;
  color:#fff;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
}

button:hover {
  background:#1ebe5d;
}

.checkbox {
  margin-bottom:15px;
  font-size:14px;
}

.small {
  font-size:12px;
  color:#aaa;
  text-align:center;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">SiteSnel24</div>

<h1>Gratis demo website aanvragen</h1>

<p>
Vul je gegevens in en upload maximaal 3 foto's.  
Wij maken gratis een demo website voor jouw bedrijf.
</p>

<form action="https://formsubmit.co/info@sitesnel24.nl" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_subject" value="Nieuwe demo aanvraag SiteSnel24">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://sitesnel24.nl/bedankt/">

<input type="text" name="_honey" style="display:none">

<input type="text" name="Bedrijfsnaam" placeholder="Bedrijfsnaam" required>
<input type="text" name="Naam" placeholder="Naam" required>
<input type="tel" name="Telefoon" placeholder="Telefoonnummer" required>
<input type="email" name="Email" placeholder="E-mailadres">

<textarea name="Beschrijving" placeholder="Wat doet jouw bedrijf en wat bied je aan?" required></textarea>

<label>Upload foto's (max 3):</label>
<input type="file" name="foto1" accept="image/*">
<input type="file" name="foto2" accept="image/*">
<input type="file" name="foto3" accept="image/*">

<div class="checkbox">
<label>
<input type="checkbox" required>
 Ik ben geen robot en vul dit formulier zelf in
</label>
</div>

<button type="submit">Vraag gratis demo aan</button>

</form>

<p class="small">
Na het verzenden gaan wij direct aan de slag met jouw demo.
</p>

</div>

</body>
</html>
